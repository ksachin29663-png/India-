<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>प्रो ब्लॉग एडिटर</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        #editor { height: 300px; background: white; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<h2>ब्लॉग लिखें</h2>
<input type="text" id="title" placeholder="ब्लॉग टाइटल">
<input type="file" id="imageInput">

<div id="editor"></div>

<button onclick="publishBlog()">पब्लिश करें</button>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    var quill = new Quill('#editor', {
        modules: { toolbar: [
            [{ 'header': [1, 2, false] }],
            ['bold', 'italic', 'underline'],
            [{ 'color': [] }, { 'background': [] }], // यहाँ से आप कलर और बैकग्राउंड बदल सकते हैं
            ['image', 'link']
        ]},
        theme: 'snow'
    });

    function publishBlog() {
        // यह कंटेंट HTML के रूप में सेव होगा
        const content = quill.root.innerHTML;
        const title = document.getElementById('title').value;
        console.log("यह डेटा Firestore में जाएगा:", title, content);
        alert("ब्लॉग पोस्ट तैयार है!");
    }
</script>
</body>
</html>
