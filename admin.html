<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>VishwaPulse Admin Panel</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        #editor { height: 300px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box">
        <h2>एडमिन लॉगिन</h2>
        <button onclick="login()">Google से लॉगिन करें</button>
    </div>

    <div id="admin-box" style="display:none;">
        <h2>खबर लिखें (VishwaPulse)</h2>
        <input type="text" id="title" placeholder="न्यूज़ हेडलाइन...">
        <div id="editor"></div>
        <button onclick="publish()">पब्लिश करें</button>
        <hr>
        <h3>पुरानी पोस्ट्स</h3>
        <div id="posts"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCg1OUvIut1NJOMaHhMsvN0_54dpbPIo*", 
        authDomain: "project-8621d575-e2f7-45a2-963.firebaseapp.com",
        projectId: "project-8621d575-e2f7-45a2-963",
        storageBucket: "project-8621d575-e2f7-45a2-963.appspot.com",
        messagingSenderId: "751621829065",
        appId: "1:751621829065:web:935e4dfbbb4d52e211z8c4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // एडिटर सेटअप
    var quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'image', { 'color': [] }]] } });

    // लॉगिन फंक्शन (Redirect)
    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => auth.signInWithRedirect(provider));
    }

    auth.getRedirectResult().then(res => { if(res.user) checkAdmin(res.user); });
    auth.onAuthStateChanged(user => { if(user) checkAdmin(user); });

    function checkAdmin(user) {
        if(user.email === "ksachin29663@gmail.com") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
            loadPosts();
        } else {
            alert("आप एडमिन नहीं हैं!");
            auth.signOut();
        }
    }

    function publish() {
        db.collection("posts").add({
            title: document.getElementById('title').value,
            content: quill.root.innerHTML,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => alert("पब्लिश हो गया!"));
    }

    function loadPosts() {
        db.collection("posts").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => html += `<div>${doc.data().title} <button onclick="del('${doc.id}')">Delete</button></div>`);
            document.getElementById('posts').innerHTML = html;
        });
    }

    function del(id) { db.collection("posts").doc(id).delete(); }
</script>
</body>
</html>
