<div id="editor"></div>
<button onclick="publishPost()">पोस्ट पब्लिश करें</button>

<div id="admin-posts"></div>

<script>
// Quill Editor सेटअप (इमेज सपोर्ट के साथ)
var quill = new Quill('#editor', {
    modules: { toolbar: [['bold', 'italic', 'image']] }, // यहाँ 'image' जोड़ा है
    theme: 'snow'
});

// पोस्ट डिलीट करने का फंक्शन
window.deletePost = (id) => {
    if(confirm("क्या आप ये पोस्ट हटाना चाहते हैं?")) {
        deleteDoc(doc(db, "posts", id)).then(() => alert("पोस्ट हट गई!"));
    }
};

// लॉगिन सिक्योरिटी (सिर्फ आपकी जीमेल के लिए)
onAuthStateChanged(auth, (user) => {
    if (user && user.email === "your-email@gmail.com") { // अपनी जीमेल यहाँ लिखें
        console.log("Welcome Admin");
    } else {
        window.location.href = "index.html"; // बाहरी को बाहर निकालें
    }
});
</script>
