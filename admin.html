<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>VishwaPulse Admin | सुरक्षित लॉगिन</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 20px; }
        .box { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #editor { height: 300px; margin-bottom: 20px; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; cursor: pointer; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <div id="login-sec">
        <h2>एडमिन पहचान सत्यापित करें</h2>
        <input type="email" id="emailInput" class="input-field" placeholder="अपनी ईमेल यहाँ डालें...">
        <button class="btn" style="background:#007bff;" onclick="verifyUser()">लॉग इन करें</button>
    </div>

    <div id="admin-sec" style="display:none;">
        <h2 style="color:#d32f2f;">VishwaPulse एडमिन पैनल</h2>
        <input type="text" id="title" class="input-field" placeholder="न्यूज़ हेडलाइन...">
        <div id="editor"></div>
        <button class="btn" style="background:#2e7d32;" onclick="publish()">पोस्ट पब्लिश करें</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCg1OUvIut1NJOMaHhMsvN0_54dpbPIo*", authDomain: "project-8621d575-e2f7-45a2-963.firebaseapp.com", projectId: "project-8621d575-e2f7-45a2-963", storageBucket: "project-8621d575-e2f7-45a2-963.appspot.com", messagingSenderId: "751621829065", appId: "1:751621829065:web:935e4dfbbb4d52e211z8c4" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    var quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline', { 'color': [] }, 'image']] } });

    // यहाँ हम आपकी ईमेल चेक कर रहे हैं
    function verifyUser() {
        const enteredEmail = document.getElementById('emailInput').value;
        const myEmail = "ksachin29663@gmail.com"; // यह आपकी ईमेल है

        if(enteredEmail === myEmail) {
            document.getElementById('login-sec').style.display = 'none';
            document.getElementById('admin-sec').style.display = 'block';
            alert("स्वागत है सचिन भाई!");
        } else {
            alert("सॉरी, तुम सचिन नहीं हो। एक्सेस बंद है।");
        }
    }

    function publish() {
        db.collection("posts").add({
            title: document.getElementById('title').value,
            content: quill.root.innerHTML,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => alert("पोस्ट लाइव हो गई!"));
    }
</script>
</body>
</html>
