<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>ViewsPlus - Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="post-card">
        <h2>नई पोस्ट लिखें</h2>
        <input type="text" id="postTitle" placeholder="टाइटल यहाँ लिखें" style="width:100%; padding:10px; margin-bottom:10px;">

        <button id="publishBtn" style="background:green; color:white; padding:10px; width:100%;">पब्लिश करें</button>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
