<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइव स्कोर</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 5px;
            text-align: center;
        }
        .live-scoreboard {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
        }
        .score { font-size: 26px; font-weight: bold; margin: 2px 0; }
        .status { color: #f59e0b; font-weight: bold; font-size: 13px; }
        .info-section {
            background-color: #1e293b;
            border-radius: 6px;
            padding: 8px;
            text-align: left;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="live-scoreboard">
        <div class="score" id="score-display">0 / 0 (0.0 Over)</div>
        <div class="status" id="status-display">लोड हो रहा है...</div>
    </div>

    <div class="info-section">
        <div id="commentary-display" style="color: #cbd5e1; line-height: 1.4;">
            कनेक्ट हो रहा है...
        </div>
    </div>

    <script>
        const SHEET_ID = '1XAU85TH4lkw03uetVfDW-bv6t3qtdcBvdD6pzgpmcgo'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function fetchLiveScore() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const row = jsonData.table.rows[0].c;

                const runs = row[0] ? row[0].v : '0';
                const wickets = row[1] ? row[1].v : '0';
                const overs = row[2] ? row[2].v : '0.0';
                const status = row[3] ? row[3].v : '';
                const commentary = row[4] ? row[4].v : '';

                document.getElementById('score-display').innerHTML = `${runs} / ${wickets} <span style="font-size: 15px; font-weight: normal;">(${overs} Over)</span>`;
                document.getElementById('status-display').innerText = status;
                document.getElementById('commentary-display').innerHTML = commentary.replace(/\n/g, '<br>');
            } catch (error) {
                console.error("Error:", error);
            }
        }

        setInterval(fetchLiveScore, 3000);
        fetchLiveScore();
    </script>
</body>
          </html>
