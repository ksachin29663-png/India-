<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewsPlus.com</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* लेआउट को प्रोफेशनल बनाने के लिए */
        nav { display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid #ddd; }
        .nav-btn { cursor: pointer; font-weight: bold; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .three-dots { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo-text">ViewsPlus.com</div>
            <div class="three-dots">⋮</div>
        </div>
        <div style="text-align: center; font-size: 12px; margin-bottom: 10px;">दुनिया की धड़कन</div>
        
        <nav>
            <span class="nav-btn" onclick="showSection('home')">होम</span>
            <span class="nav-btn" onclick="showSection('live')">लाइव</span>
            <span class="nav-btn" onclick="showSection('cricket')">क्रिकेट</span>
        </nav>
    </header>

    <div id="content-area" style="padding: 10px;">
        <div id="posts-container"></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
