<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VishwaPulse.com | आपकी अपनी खबर</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* वेलकम पेज की स्टाइलिंग */
        #welcome-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #03a9f4; color: white; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; transition: opacity 0.5s;
        }
        #welcome-page button {
            padding: 12px 30px; margin-top: 20px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
            background: white; color: #03a9f4; font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="welcome-page">
        <h1 style="font-size: 45px;">VishwaPulse.com</h1>
        <p style="font-size: 22px;">स्वागत है! ताज़ा खबरों के लिए तैयार रहें।</p>
        <button onclick="closeWelcome()">देखें खबरें</button>
    </div>

    <script>
        function closeWelcome() {
            document.getElementById('welcome-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-page').style.display = 'none';
            }, 500);
        }
    </script>

    <header class="header">
        <div class="logo">VishwaPulse.com</div>
    </header>

    <nav class="nav-bar">
        <a href="#">होम</a>
        <a href="#">देश</a>
        <a href="#">दुनिया</a>
        <a href="#">क्रिकेट</a>
        <a href="#">लाइव</a>
    </nav>

    <div id="root-container"></div>
    <div id="posts-container"></div>

    <script type="module" src="js/app.js"></script>

    <div style="margin-top: 30px; padding: 20px; text-align: center; font-size: 14px;">
        <a href="privacy-policy.html" style="margin: 0 5px;">गोपनीयता नीति</a> |
        <a href="contact-us.html" style="margin: 0 5px;">Contact Us</a> |
        <a href="disclaimer.html" style="margin: 0 5px;">Disclaimer</a> |
        <a href="terms-and-conditions.html" style="margin: 0 5px;">Terms & Conditions</a> |
        <a href="sitemap.xml" style="margin: 0 5px;">Sitemap</a> |
        <a href="robots.txt" style="margin: 0 5px;">Robots.txt</a> |
        <a href="about-us.html" style="margin: 0 5px;">About Us</a>
    </div>

</body>
</html>
